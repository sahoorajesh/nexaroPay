server.port = 8091
spring.application.name=user-service
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - [requestId=%X{requestId}] %msg%n

spring.datasource.url=jdbc:postgresql://localhost:5432/nexaroPayDB
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.dbcp2.max-wait-millis=30000
spring.datasource.dbcp2.validation-query=/* ping */ select 1
spring.datasource.dbcp2.validation-query-timeout=30

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.id.new_generator_mappings=true
spring.jpa.show-sql=true

user.created.topic=USER-REGISTERED

kafka.bootstrapAddress=localhost:9092

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=

jwt.secret=nexaroPaySuperSecureJwtSecretKey123456789