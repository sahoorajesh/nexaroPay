server.port = 8091
spring.datasource.url=jdbc:postgresql://localhost:5432/nexaroPayDB
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.dbcp2.max-wait-millis=30000
spring.datasource.dbcp2.validation-query=/* ping */ select 1
spring.datasource.dbcp2.validation-query-timeout=30

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.id.new_generator_mappings=true
spring.jpa.show-sql=true

user.created.topic=USER-CREATED

kafka.bootstrapAddress=0.0.0.0:9092,0.0.0.0:9093

spring.redis.host=localhost
spring.redis.port=6379
spring.redis.password=